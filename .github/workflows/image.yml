name: Build lidarr-deduper Docker image

on:
  push:
    branches: main
    paths-ignore:
      - '.vscode/**'
      - '**.md'
      - 'renovate.json'
      - 'docker-compose.yml'
      - '.gitignore'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: https://code.forgejo.org/actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Docker Buildx
        uses: https://code.forgejo.org/docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
        with:
          buildkitd-config-inline: |
            [registry."forgejo.home.arpa"]
              http = true

      - name: Set up Go
        uses: https://code.forgejo.org/actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6
        with:
          go-version: '1.24.6'

      - name: Docker meta
        id: meta
        uses: https://code.forgejo.org/docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: forgejo.home.arpa/ben/lidarr-deduper
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Login to the Forgejo registry
        uses: https://github.com/docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: forgejo.home.arpa
          username: ben
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and publish
        uses: https://code.forgejo.org/docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
