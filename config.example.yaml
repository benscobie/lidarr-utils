# Example configuration file for lidarr-utils
# Copy this file to config.yaml and adjust the settings for your environment

# Lidarr connection settings
lidarr:
  url: "http://localhost:8686"  # Your Lidarr URL
  api_key: "your-api-key-here"  # Your Lidarr API key

# Application settings
app:
  dry_run: true                   # Set to false to actually make changes
  log_level: "info"               # Log level: debug, info, warn, error
  log_file: "lidarr-utils.log"   # Path to log file (optional)

# Dedupe command settings
dedupe:
  add_import_exclusion: false     # Add removed singles to import exclusion list

# Monitor command settings
monitor:
  official_only: false                # Only process albums with no secondary types
  exclude_secondary_types: []         # Secondary types to exclude (e.g. ["Live", "Compilation"])
  queue:
    max_in_queue: 2                   # Max concurrent searches in Lidarr queue
    delay_seconds: 5                  # Delay (seconds) after each search submission

# Scheduling settings (dedupe only)
schedule:
  enabled: false                  # Enable scheduled runs
  cron: "0 2 * * *"              # Run daily at 2 AM (when enabled)
  run_once: true                  # Run once and exit (overrides schedule when true)
